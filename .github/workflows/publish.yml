name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a manual run from the Actions tab

# Permissions needed for the official GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render decks
        run: |
          quarto render presentation.qmd
          quarto render CSF_Disclosure/disclosure.qmd

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # serves index.html (redirect), presentation.html, assets, libs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
